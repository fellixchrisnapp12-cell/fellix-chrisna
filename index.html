<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lamp Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Control Panel ESP32</h1>
        <div class="card">
            <h3>Intensitas Cahaya</h3>
            <div id="ldr-value" class="sensor-val">0</div>
        </div>
        
        <div class="card">
            <h3>Kontrol Lampu</h3>
            <div class="btn-group">
                <button onclick="sendControl('on')" class="btn btn-on">NYALAKAN</button>
                <button onclick="sendControl('off')" class="btn btn-off">MATIKAN</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
